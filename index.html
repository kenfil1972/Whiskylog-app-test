<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhiskyLog v1.10</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
    <h1>WhiskyLog v1.10</h1>

    <div id="home">
        <div class="card">
            <h2>Unopened bottles</h2>
            <div class="images" id="unopenedImages"></div>
        </div>

        <div class="card">
            <h2>Opened bottles</h2>
            <div class="images" id="openedImages"></div>
        </div>

        <div class="card">
            <h2>Empty bottles</h2>
            <div class="images" id="emptyImages"></div>
        </div>

        <div class="card">
            <h2>Add bottle to library</h2>
            <p>Define reusable bottle data</p>
            <button onclick="addLibrary()">Add</button>
        </div>

        <div class="card">
            <h2>Add new bottle</h2>
            <button onclick="addBottle()">Add bottle</button>
        </div>

        <div class="card">
            <h2>Add test of bottle</h2>
            <button onclick="addTasting()">Add tasting</button>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
